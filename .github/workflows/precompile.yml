name: Precompile

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/precompile.yml"
      - "CHANGELOG.md"
      - "VERSION"
      - "config/**"
      - "handler/**"
      - "middleware/**"
      - "model/**"
      - "repository/**"
      - "router/**"
      - "service/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "web/**"
  pull_request:
    paths:
      - ".github/workflows/precompile.yml"
      - "CHANGELOG.md"
      - "VERSION"
      - "config/**"
      - "handler/**"
      - "middleware/**"
      - "model/**"
      - "repository/**"
      - "router/**"
      - "service/**"
      - "main.go"
      - "go.mod"
      - "go.sum"
      - "web/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: precompile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /tmp/infinite-canvas .

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
